version: 1

sources:
  - docs/diagrams/**/*.mmd
  - docs/diagrams/**/*.puml
  - docs/diagrams/**/*.plantuml
  - docs/diagrams/**/*.dot
  - docs/diagrams/**/*.d2

output: docs/generated

defaults:
  format: svg
  theme: default

engines:
  graphviz:
    options:
      layout: dot

preview:
  debounceMs: 400

render:
  onSave: false
