name: Code To UML
description: Render diagrams or create a semantic diagram change map for a pull request
inputs:
  mode:
    description: render or pr-diff
    default: render
  server-url:
    description: Code To UML base URL
    required: true
  api-key:
    description: Optional API key for a protected hosted service; omit for local mode
    required: false
  engine:
    description: Diagram engine, for example plantuml or mermaid
    required: false
  format:
    description: svg, png, pdf, jpeg or txt
    default: svg
  source:
    description: Source diagram file
    required: false
  output:
    description: Output file
    required: false
  diff-output:
    description: SVG path generated by PR diff mode
    default: artifacts/diagram-pr-diff.svg
  github-token:
    description: GITHUB_TOKEN used to comment on the pull request
    required: false
  comment:
    description: Post a pull request summary comment
    default: "true"
outputs:
  changed:
    description: Whether diagram files changed in PR diff mode
    value: ${{ steps.pr-diff.outputs.changed }}
  diagram-count:
    description: Number of changed diagram files
    value: ${{ steps.pr-diff.outputs.diagram-count }}
  added:
    description: Number of added semantic nodes
    value: ${{ steps.pr-diff.outputs.added }}
  modified:
    description: Number of modified semantic nodes
    value: ${{ steps.pr-diff.outputs.modified }}
  removed:
    description: Number of removed semantic nodes
    value: ${{ steps.pr-diff.outputs.removed }}
  output:
    description: Generated artifact path
    value: ${{ steps.pr-diff.outputs.output }}
runs:
  using: composite
  steps:
    - name: Render diagram
      if: inputs.mode == 'render'
      shell: bash
      env:
        CTU_SERVER: ${{ inputs.server-url }}
        CTU_API_KEY: ${{ inputs.api-key }}
        CTU_ENGINE: ${{ inputs.engine }}
        CTU_FORMAT: ${{ inputs.format }}
        CTU_SOURCE: ${{ inputs.source }}
        CTU_OUTPUT: ${{ inputs.output }}
      run: |
        set -euo pipefail
        auth=()
        if [[ -n "${CTU_API_KEY}" ]]; then auth=(-H "Authorization: Bearer ${CTU_API_KEY}"); fi
        curl --fail-with-body --silent --show-error "${auth[@]}" \
          -H "Content-Type: text/plain" \
          --data-binary "@${CTU_SOURCE}" \
          "${CTU_SERVER%/}/${CTU_ENGINE}/${CTU_FORMAT}" \
          --output "${CTU_OUTPUT}"
    - name: Build pull request diagram diff
      id: pr-diff
      if: inputs.mode == 'pr-diff'
      shell: bash
      env:
        CTU_SERVER: ${{ inputs.server-url }}
        CTU_API_KEY: ${{ inputs.api-key }}
        CTU_DIFF_OUTPUT: ${{ inputs.diff-output }}
        CTU_COMMENT: ${{ inputs.comment }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: node "${{ github.action_path }}/github-action/pr-diagram-diff.mjs"
    - name: Upload diagram change map
      if: inputs.mode == 'pr-diff' && steps.pr-diff.outputs.changed == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: code-to-uml-pr-diff
        path: ${{ inputs.diff-output }}
        if-no-files-found: error
